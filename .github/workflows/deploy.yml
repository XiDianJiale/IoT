name: CI/CD Pipeline for IoT Backend

# 触发条件：当主分支有代码 Push 时触发
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 如果用 Maven，执行打包
      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 替换为你自己的 Docker Hub 仓库名
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/iot-backend:latest

  deploy-to-azure:
    needs: build-and-push # 必须等打包推送完成后才执行部署
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          # 登录 VM 后执行的脚本
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/iot-backend:latest
            sudo docker stop backend-server || true
            sudo docker rm backend-server || true
            sudo docker run -d -p 8080:8080 --name backend-server --restart=always ${{ secrets.DOCKERHUB_USERNAME }}/iot-backend:latest
            sudo docker image prune -f # 清理虚悬镜像，节省磁盘空间